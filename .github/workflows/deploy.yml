name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Pre-build gates
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Validate project registry
        run: npm run validate:projects
      - name: Validate contact data
        run: npx tsx scripts/check-contact.ts
      - name: Disclosure scan (source)
        env:
          DISCLOSURE_BLOCKLIST: ${{ secrets.DISCLOSURE_BLOCKLIST }}
        run: npx tsx scripts/check-disclosure.ts src/data

      # Build (Vite + SSG → dist/), warnings-as-errors
      - name: Build
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee /tmp/build.log
          if grep -qiE 'warning' /tmp/build.log; then
            echo "FAIL: build produced warnings (warnings-as-errors)"; exit 1
          fi

      # Post-build gates over dist/
      - name: SEO check
        run: npx tsx scripts/check-seo.ts dist/index.html
      - name: Disclosure scan (built output)
        env:
          DISCLOSURE_BLOCKLIST: ${{ secrets.DISCLOSURE_BLOCKLIST }}
        run: npx tsx scripts/check-disclosure.ts dist
      - name: Google verification file checksum
        run: |
          set -euo pipefail
          test -f dist/google78a83929b1057f91.html
          want=$(cat .checksums/google-verify.sha256)
          got=$(sha256sum dist/google78a83929b1057f91.html | awk '{print $1}')
          [ "$want" = "$got" ] || { echo "FAIL: google verification checksum mismatch"; exit 1; }
      - name: Install htmltest
        run: |
          set -euo pipefail
          HTMLTEST_VERSION=$(grep '^htmltest=' .ci/versions.txt | cut -d= -f2)
          curl -sSL "https://github.com/wjdp/htmltest/releases/download/v${HTMLTEST_VERSION}/htmltest_${HTMLTEST_VERSION}_linux_amd64.tar.gz" | tar -xz
          sudo mv htmltest /usr/local/bin/
      - name: HTML validity + link check
        run: htmltest --conf .htmltest.yml dist
      - name: Lighthouse CI (performance budget)
        run: npx lhci autorun

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
