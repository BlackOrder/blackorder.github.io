<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- TEMP texture calibration: ?tex=0..1 overrides the ambient texture opacity live (remove once tuned). -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(location.search).get('tex');
          if (p !== null && p !== '') document.documentElement.style.setProperty('--tex-opacity', p);
        } catch (e) {}
      })();
    </script>
    <!-- title, description, color-scheme, canonical, OG/Twitter, JSON-LD are owned by <Head> in
         src/App.tsx (single source of truth — avoids duplicate tags in the prerendered HTML). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Self-hosted display font (both weights — preload prevents FOUT on the hero) -->
    <link rel="preload" as="font" type="font/woff2" crossorigin="anonymous" href="/fonts/cormorant-garamond-300.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin="anonymous" href="/fonts/cormorant-garamond-400.woff2" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
